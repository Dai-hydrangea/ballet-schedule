/* ───── Auto-parse (no explicit button) ───── */

async function autoParse() {
  const month = document.getElementById('import-month').value;
  const file = document.getElementById('import-pdf').files[0];
  const text = document.getElementById('import-text').value.trim();

  if (!file && !text) {
    CURRENT_PREVIEW = null;
    document.getElementById('import-preview').hidden = true;
    document.getElementById('import-action').disabled = true;
    document.getElementById('import-download').disabled = true;
    clearImportStatus();
    return;
  }

  let events = [];
  try {
    if (file) {
      const pdfText = await extractPdfText(file);
      events = parseAny(pdfText, month);
    } else {
      events = parseAny(text, month);
    }
  } catch (e) {
    setImportStatus('読み取り失敗: ' + e.message, 'error');
    return;
  }

  if (events.length === 0) {
    setImportStatus('予定が見つかりませんでした。 形式を確認してください (例: 「10日(日) 13:00~15:30 演目名」)', 'error');
    document.getElementById('import-preview').hidden = true;
    document.getElementById('import-action').disabled = true;
    document.getElementById('import-download').disabled = true;
    return;
  }

  const monthEvents = events.filter(ev => ev.date && ev.date.startsWith(month));
  const skipped = events.length - monthEvents.length;

  CURRENT_PREVIEW = { month, events: monthEvents, mode: 'merge' };
  renderPreview(monthEvents);

  document.getElementById('import-action').disabled = false;
  document.getElementById('import-download').disabled = false;

  // Update action label depending on capability
  const actionBtn = document.getElementById('import-action');
  if (API_BASE_URL && getUploadKey()) {
    actionBtn.textContent = `カレンダーに追加 (${monthEvents.length} 件)`;
  } else {
    actionBtn.textContent = `ダウンロード (${monthEvents.length} 件) → 大作さんに送る`;
  }

  const msg = `${monthEvents.length} 件 認識` + (skipped > 0 ? ` (${skipped} 件は対象月外でスキップ)` : '');
  setImportStatus(msg, 'success');
}

function parseAny(text, month) {
  const trimmed = (text || '').trim();
  // Auto-detect JSON (大作さんが Claude 経由で貼り付ける高度な使い方も対応)
  if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
    try {
      return parseJsonInput(trimmed);
    } catch (e) {
      // Fall through to text parser
    }
  }
  return parseTextInput(text, month);
}

function parseJsonInput(raw) {
  const text = raw.trim();
  if (!text) throw new Error('JSON を貼り付けてください');
  let obj;
  try { obj = JSON.parse(text); } catch (e) { throw new Error('JSON 構文エラー: ' + e.message); }
  let events;
  if (Array.isArray(obj)) events = obj;
  else if (Array.isArray(obj.events)) events = obj.events;
  else throw new Error('events 配列が見つかりません');
  return events.map(normalizeEvent);
}

function normalizeEvent(e) {
  if (!e || typeof e !== 'object') throw new Error('event が object でない');
  const norm = {
    date: e.date,
    start: e.start || '',
    end: e.end || '',
    studio: e.studio || guessStudio(e.label || ''),
    type: e.type || guessType(e.label || ''),
    label: e.label || '',
    tags: Array.isArray(e.tags) ? e.tags : [],
    target: e.target || '',
  };
  if (e.note) norm.note = e.note;
  return norm;
}

const PIECE_KEYWORDS = ['海賊','オーロラ','道化','貴婦人','宝石','ディアナ','トロワ','ガムザ','グルナーラ','パドゥドゥ','Bell','Va','ヴァリエーション','ピラティス','シス','小姓'];

function guessType(label) {
  const l = label || '';
  if (PIECE_KEYWORDS.some(k => l.includes(k))) return 'rehearsal';
  if (l.includes('振付')) return 'choreography';
  return 'lesson';
}

function guessStudio(label) {
  const l = label || '';
  if (l.includes('海賊') || l.includes('合同')) return 'joint';
  return 'kawagoe';
}

function extractTags(label) {
  const found = [];
  for (const k of PIECE_KEYWORDS) {
    if (label.includes(k)) found.push(k === 'Va' ? 'ヴァリエーション' : k);
  }
  return [...new Set(found)];
}

function parseTextInput(raw, defaultMonth) {
  // ── 0) 月スコープで pre-filter (例: 「4月中は」 が defaultMonth と一致したら、 そこ以降だけ採用) ──
  const filtered = filterByMonthScope(raw, defaultMonth);

  const lines = filtered.split(/\r?\n/);
  const events = [];

  let currentDate = null;
  let currentDateContext = '';
  let currentWeekday = null;        // 0=日 〜 6=土
  let currentWeekdayContext = '';

  for (let rawLine of lines) {
    let line = rawLine.replace(/[　\t]+/g, ' ').trim();
    if (!line) continue;

    // Month header / scope marker → date context をリセット (events 生成しない)
    if (/^\s*\d{1,2}月\s*$/.test(line)
        || /^\s*\d{1,2}月(中は|のみ|だけ|限定|から)\s*$/.test(line)) {
      currentDate = null;
      currentWeekday = null;
      continue;
    }

    // 2) 曜日ヘッダの認識: 「○火曜日」 「火曜日」 「○土曜日は」 等
    const wdInfo = tryExtractWeekday(line);
    if (wdInfo) {
      currentWeekday = wdInfo.weekday;
      currentWeekdayContext = wdInfo.context;
      currentDate = null;
      // 同じ行に時刻情報があれば extract
      if (wdInfo.rest) {
        const timeInfo = tryExtractTime(wdInfo.rest);
        if (timeInfo) {
          const label = cleanLabel(timeInfo.rest);
          for (const d of getMatchingDates(defaultMonth, currentWeekday)) {
            events.push(makeTextEvent(d, timeInfo.start, timeInfo.end, label, currentWeekdayContext));
          }
        }
      }
      continue;
    }

    // 3) 日付ヘッダの認識 (5/22, 5月22日, 22日, 22土 等)
    const dateInfo = tryExtractDate(line, defaultMonth);
    let rest = line;
    if (dateInfo) {
      currentDate = dateInfo.date;
      currentDateContext = dateInfo.context;
      currentWeekday = null;
      rest = dateInfo.rest;
    }

    // 4) 時刻範囲 (or 単発時刻) を抽出
    const timeInfo = tryExtractTime(rest);
    if (!timeInfo) continue;
    const label = cleanLabel(timeInfo.rest);

    if (currentDate) {
      events.push(makeTextEvent(currentDate, timeInfo.start, timeInfo.end, label, currentDateContext));
    } else if (currentWeekday !== null) {
      for (const d of getMatchingDates(defaultMonth, currentWeekday)) {
        events.push(makeTextEvent(d, timeInfo.start, timeInfo.end, label, currentWeekdayContext));
      }
    }
  }

  // 重複除去 (同 date + start + end + label の組合せ)
  const seen = new Set();
  const dedup = [];
  for (const ev of events) {
    const k = `${ev.date}|${ev.start}|${ev.end}|${ev.label}|${ev.studio}`;
    if (seen.has(k)) continue;
    seen.add(k);
    dedup.push(ev);
  }
  return dedup;
}

/* ───── Month scope filter ─────
 * 「4月中は」 「5月から」 等のマーカーを認識して、
 * 対象月 (defaultMonth) に該当しないセクションを除外する。
 *
 * ルール:
 *   - 「N月中は」 / 「N月のみ」 → N がデフォルト月なら、 以降を採用 (以前は破棄)、
 *     N がデフォルト月でないなら、 以降は破棄
 *   - 「N月から」 → N がデフォルト月「以下」 なら以降採用、 そうでないなら破棄
 *   - マーカーがなければ、 全体を採用 (= 現行挙動)
 */
function filterByMonthScope(raw, defaultMonth) {
  const [_, defM] = defaultMonth.split('-').map(Number);
  const lines = raw.split(/\r?\n/);

  const pureMonthHeader = /^\s*(\d{1,2})月\s*$/;
  const scopeMarker = /(\d{1,2})月(中は|のみ|だけ|限定|から)/;

  let activeMonth = null;     // current section's month (null = pre-header, treated as default)
  let activeScopeKind = null; // 'include' or 'exclude' for marker-based scopes
  const include = new Array(lines.length).fill(true);
  let anyHeaderSeen = false;

  for (let i = 0; i < lines.length; i++) {
    const trimmed = lines[i].trim();

    // 1) Standalone month header: "4月" or "5月" on its own line
    const pm = trimmed.match(pureMonthHeader);
    if (pm) {
      activeMonth = +pm[1];
      activeScopeKind = (activeMonth === defM) ? 'include' : 'exclude';
      anyHeaderSeen = true;
      include[i] = true; // keep so parseTextInput can reset its date context
      continue;
    }

    // 2) Marker: "4月中は", "5月から" etc.
    const sm = trimmed.match(scopeMarker);
    if (sm) {
      const target = +sm[1];
      const kind = sm[2];
      anyHeaderSeen = true;
      if (kind === 'から') {
        activeScopeKind = (defM >= target) ? 'include' : 'exclude';
      } else {
        activeScopeKind = (defM === target) ? 'include' : 'exclude';
      }
      activeMonth = target;
      include[i] = true; // keep so parseTextInput can reset its date context
      continue;
    }

    // 3) Skip annotation lines (☆/★/※) — they contain dates/times that
    //    shouldn't be parsed as actual events.
    if (/^[☆★※注釈※]/.test(trimmed)) {
      include[i] = false;
      continue;
    }

    // 4) Apply the active scope
    if (activeScopeKind === null) {
      include[i] = true;
    } else {
      include[i] = (activeScopeKind === 'include');
    }
  }

  // If any header was seen, drop pre-header lines unless they have explicit dates
  if (anyHeaderSeen) {
    let firstHeader = -1;
    for (let i = 0; i < lines.length; i++) {
      const t = lines[i].trim();
      if (pureMonthHeader.test(t) || scopeMarker.test(t)) { firstHeader = i; break; }
    }
    if (firstHeader > 0) {
      for (let i = 0; i < firstHeader; i++) {
        const hasExplicitDate = /\d{1,2}[\/\-]\d{1,2}|\d{1,2}月\s*\d{1,2}日|\d{1,2}\s*日(?![月])/.test(lines[i]);
        if (!hasExplicitDate) include[i] = false;
      }
    }
  }

  return lines.filter((_, i) => include[i]).join('\n');
}

/* ───── Weekday header ───── */

function tryExtractWeekday(line) {
  // 「○火曜日」 「○火曜日は」 「火曜日」 「火曜」 「●火曜日」 「・火曜日」
  const m = line.match(/^[○⚪◯●・\s]*\s*(日|月|火|水|木|金|土)曜(?:日)?(?:は|：|:)?\s*(.*)$/);
  if (!m) return null;
  const wd = ['日','月','火','水','木','金','土'].indexOf(m[1]);
  if (wd < 0) return null;
  const rest = (m[2] || '').trim();
  // 「土曜日は今の所15:00〜16:30一般クラスで変更なし。」 みたいな埋め込み時刻も rest として返す
  return { weekday: wd, rest, context: `${m[1]}曜日` };
}

function getMatchingDates(defaultMonth, weekday) {
  const [y, m] = defaultMonth.split('-').map(Number);
  const last = new Date(y, m, 0).getDate();
  const dates = [];
  for (let d = 1; d <= last; d++) {
    const dt = new Date(y, m - 1, d);
    if (dt.getDay() === weekday) {
      dates.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    }
  }
  return dates;
}

/* ───── Date extraction (multi-pattern) ───── */

function tryExtractDate(line, defaultMonth) {
  const [defY, defM] = defaultMonth.split('-').map(Number);

  const patterns = [
    // 2026/5/22, 2026-5-22
    { re: /(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/, take: (m) => ({ y: +m[1], mo: +m[2], d: +m[3] }) },
    // 5月22日 or 5月22日(日)
    { re: /(\d{1,2})月\s*(\d{1,2})日(?:\s*[\(((](日|月|火|水|木|金|土)[\))]\s*)?/, take: (m) => ({ y: defY, mo: +m[1], d: +m[2] }) },
    // 5/22, 5-22 (avoid matching 2026/5/22 again — handled above; this matches when no Y)
    { re: /(?:^|[\s、,])(\d{1,2})[\/\-](\d{1,2})(?!\d)(?!月)/, take: (m) => ({ y: defY, mo: +m[1], d: +m[2] }) },
    // 22日 or 22日(日) (no month, use default)
    { re: /(?:^|[\s、,])(\d{1,2})\s*日(?:\s*[\(((](日|月|火|水|木|金|土)[\))]\s*)?(?!月)/, take: (m) => ({ y: defY, mo: defM, d: +m[1] }) },
    // 22(土) のような数字+曜日 (Image 3 の "25土" 形式)
    { re: /^(\d{1,2})\s*(日|月|火|水|木|金|土)(?![\d:時月])/, take: (m) => ({ y: defY, mo: defM, d: +m[1] }) },
  ];

  for (const p of patterns) {
    const m = line.match(p.re);
    if (!m) continue;
    const { y, mo, d } = p.take(m);
    if (!d || d < 1 || d > 31) continue;
    if (mo < 1 || mo > 12) continue;
    if (y < 2000 || y > 2100) continue;
    const date = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const matchStart = m.index;
    const matchEnd = m.index + m[0].length;
    const rest = (line.slice(0, matchStart) + ' ' + line.slice(matchEnd)).trim();
    return { date, rest, context: m[0].trim() };
  }
  return null;
}

/* ───── Time extraction (multi-pattern) ───── */

function tryExtractTime(line) {
  // ── 範囲パターン (最優先) ──
  const rangePatterns = [
    // HH:MM〜HH:MM
    {
      re: /(\d{1,2}):(\d{2})\s*[~〜～\-–−ー]\s*(\d{1,2}):(\d{2})/,
      build: (m) => ({ start: fmtTime(+m[1], +m[2]), end: fmtTime(+m[3], +m[4]) }),
    },
    // H時M分〜H時M分
    {
      re: /(\d{1,2})時(\d{1,2})分?\s*[~〜～\-–−ー]\s*(\d{1,2})時(\d{1,2})分?/,
      build: (m) => ({ start: fmtTime(+m[1], +m[2]), end: fmtTime(+m[3], +m[4]) }),
    },
    // H時(半)?〜H時(半)?
    {
      re: /(\d{1,2})時(半)?\s*[~〜～\-–−ー]\s*(\d{1,2})時(半)?/,
      build: (m) => ({
        start: fmtTime(+m[1], m[2] === '半' ? 30 : 0),
        end: fmtTime(+m[3], m[4] === '半' ? 30 : 0),
      }),
    },
    // H~HH:MM (例: 「3~5:30」)
    {
      re: /(?<![\d:])(\d{1,2})\s*[~〜～\-–−ー]\s*(\d{1,2}):(\d{2})/,
      build: (m) => ({ start: fmtTime(+m[1], 0), end: fmtTime(+m[2], +m[3]) }),
    },
    // HH:MM~H (例: 「3:30~5」)
    {
      re: /(\d{1,2}):(\d{2})\s*[~〜～\-–−ー]\s*(\d{1,2})(?![\d:時分])/,
      build: (m) => ({ start: fmtTime(+m[1], +m[2]), end: fmtTime(+m[3], 0) }),
    },
    // H~H (例: 「1~3」, 「10~12」)
    {
      re: /(?<![\d:時])(\d{1,2})\s*[~〜～\-–−ー]\s*(\d{1,2})(?![\d:時分])/,
      build: (m) => ({ start: fmtTime(+m[1], 0), end: fmtTime(+m[2], 0) }),
    },
  ];

  for (const p of rangePatterns) {
    const m = line.match(p.re);
    if (!m) continue;
    let { start, end } = p.build(m);
    // AM/PM rollover: end が start より前ならば +12h (= 午後想定)
    const sMin = toMin(start);
    let eMin = toMin(end);
    if (eMin <= sMin) {
      eMin += 12 * 60;
      end = minToTime(eMin);
    }
    const matchStart = m.index;
    const matchEnd = m.index + m[0].length;
    const rest = (line.slice(0, matchStart) + ' ' + line.slice(matchEnd)).trim();
    return { start, end, rest };
  }

  // 範囲がなかったとき、 「まで」 「から」 等の境界ワードを含む行は補足扱いで skip
  if (/(まで|から|以降|以前|より|まえ|あと|過ぎ)/.test(line)) {
    return null;
  }

  // ── 「H~ラベル」 = 開始 H 時、 終了未定 (60 分仮定) ──
  // 例: 「10~オーロラ」, 「11:30~vaクラス」, 「12:30~一部」
  const openEndedHM = line.match(/(?<![\d:])(\d{1,2}):(\d{2})\s*[~〜～]/);
  if (openEndedHM) {
    const sh = +openEndedHM[1], sm = +openEndedHM[2];
    const matchStart = openEndedHM.index;
    const matchEnd = matchStart + openEndedHM[0].length;
    const rest = (line.slice(0, matchStart) + ' ' + line.slice(matchEnd)).trim();
    return { start: fmtTime(sh, sm), end: fmtTime(sh + 1, sm), rest };
  }
  const openEndedH = line.match(/(?<![\d:時])(\d{1,2})\s*[~〜～]/);
  if (openEndedH) {
    const sh = +openEndedH[1];
    const matchStart = openEndedH.index;
    const matchEnd = matchStart + openEndedH[0].length;
    const rest = (line.slice(0, matchStart) + ' ' + line.slice(matchEnd)).trim();
    return { start: fmtTime(sh, 0), end: fmtTime(sh + 1, 0), rest };
  }

  // ── 単発時刻 (60 分仮定) ──
  const singlePatterns = [
    {
      re: /(\d{1,2})時(\d{1,2})分?/,
      build: (m) => {
        const sh = +m[1], sm = +m[2];
        return { start: fmtTime(sh, sm), end: fmtTime(sh + 1, sm) };
      },
    },
    {
      re: /(\d{1,2})時(半)?(?![\d:])/,
      build: (m) => {
        const sh = +m[1];
        const sm = m[2] === '半' ? 30 : 0;
        return { start: fmtTime(sh, sm), end: fmtTime(sh + 1, sm) };
      },
    },
    {
      re: /(\d{1,2}):(\d{2})/,
      build: (m) => {
        const sh = +m[1], sm = +m[2];
        return { start: fmtTime(sh, sm), end: fmtTime(sh + 1, sm) };
      },
    },
  ];

  for (const p of singlePatterns) {
    const m = line.match(p.re);
    if (!m) continue;
    const { start, end } = p.build(m);
    const matchStart = m.index;
    const matchEnd = m.index + m[0].length;
    const rest = (line.slice(0, matchStart) + ' ' + line.slice(matchEnd)).trim();
    return { start, end, rest };
  }
  return null;
}

function fmtTime(h, m) {
  // バレエの練習: 1〜3 時は午後と解釈 (13〜15 時)、 4 以降はそのまま
  let hh = h;
  if (hh >= 1 && hh <= 3) hh += 12;
  if (hh > 23) hh = hh % 24;
  if (hh < 0) hh = 0;
  const mm = m || 0;
  return `${String(hh).padStart(2,'0')}:${String(Math.max(0, Math.min(59, mm))).padStart(2,'0')}`;
}

function toMin(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function minToTime(min) {
  const total = ((min % (24 * 60)) + 24 * 60) % (24 * 60);
  const h = Math.floor(total / 60);
  const m = total % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function cleanLabel(s) {
  return (s || '').replace(/^[、,\s・\(\)((））]+|[、,\s・\(\)((））]+$/g, '').trim();
}

function makeTextEvent(date, start, end, label, contextNote) {
  const cleanedLabel = (label || '').trim() || 'クラス';
  const tags = extractTags(cleanedLabel);
  const type = guessType(cleanedLabel);
  const studio = guessStudio(cleanedLabel + ' ' + (contextNote || ''));
  const ev = { date, start, end, studio, type, label: cleanedLabel, tags };
  if (contextNote && /合同|川越|小手指|所沢|みよしの/.test(contextNote)) {
    ev.note = contextNote;
  }
  return ev;
}

/* ───── PDF.js (dynamic load) ───── */

let _pdfjs = null;
async function loadPdfJs() {
  if (_pdfjs) return _pdfjs;
  const mod = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs');
  mod.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
  _pdfjs = mod;
  return mod;
}

async function extractPdfText(file) {
  setImportStatus('PDF を解析中…', 'info');
  const pdfjs = await loadPdfJs();
  const buf = await file.arrayBuffer();
  const pdf = await pdfjs.getDocument({ data: buf }).promise;
  const pages = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const text = content.items.map(it => it.str).join('\n');
    pages.push(text);
  }
  return pages.join('\n\n');
}

/* ───── Preview & commit ───── */

function renderPreview(events) {
  const wrap = document.getElementById('import-preview');
  wrap.hidden = false;
  wrap.innerHTML = '';
  events.sort((a,b) => (a.date+a.start).localeCompare(b.date+b.start));
  for (const ev of events) {
    const studio = (META && META.studios[ev.studio]) || { color: 'var(--accent)', name: ev.studio };
    const div = document.createElement('div');
    div.className = 'preview-item';
    div.style.setProperty('--studio-color', studio.color);
    const dateLabel = ev.date.replace(/^\d{4}-/, '').replace(/-/, '/');
    div.innerHTML = `
      <div><span class="pv-date">${dateLabel}</span>${ev.start}–${ev.end} ${escapeHtml(ev.label)}</div>
      <div class="pv-meta">${escapeHtml(studio.name)} · ${ev.type}${ev.tags && ev.tags.length ? ' · ' + ev.tags.join(',') : ''}${ev.note ? ' · note: ' + escapeHtml(ev.note) : ''}</div>
    `;
    wrap.appendChild(div);
  }
}

function commitPreview(mode) {
  if (!CURRENT_PREVIEW) return;
  CURRENT_PREVIEW.mode = mode;
  setImportStatus(`プレビューを「${mode === 'merge' ? 'マージ' : '丸ごと置き換え'}」 モードで確定。 ダウンロード or アップロードしてください`, 'info');
}

function buildFinalPayload() {
  if (!CURRENT_PREVIEW) return null;
  const { month, events, mode } = CURRENT_PREVIEW;
  const decidedMode = mode || 'merge';
  const isCurrentMonth = (month === CURRENT_MONTH);
  let finalEvents;
  if (decidedMode === 'replace' || !isCurrentMonth) {
    finalEvents = events;
  } else {
    // merge: existing + new, dedup by (date,start,end,label)
    const seen = new Set();
    const all = [...(MONTH_DATA.events || []), ...events];
    finalEvents = [];
    for (const ev of all) {
      const key = `${ev.date}|${ev.start}|${ev.end}|${ev.label}|${ev.studio}`;
      if (seen.has(key)) continue;
      seen.add(key);
      finalEvents.push(ev);
    }
  }
  finalEvents.sort((a,b) => (a.date+a.start).localeCompare(b.date+b.start));
  return {
    month,
    month_label: formatMonthLabel(month),
    generated_at: isoLocal(new Date()),
    source: 'imported via web UI',
    events: finalEvents,
  };
}

function downloadCurrentPreview() {
  const payload = buildFinalPayload();
  if (!payload) return;
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${payload.month}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setImportStatus(`${payload.month}.json をダウンロードしました (${payload.events.length} 件)`, 'success');
}

async function uploadCurrentPreview() {
  const payload = buildFinalPayload();
  if (!payload) return;
  // Add version only when uploading to the current month (we know its version)
  if (payload.month === CURRENT_MONTH && MONTH_DATA && MONTH_DATA._version != null) {
    payload.prev_version = MONTH_DATA._version;
  }
  const key = getUploadKey();
  if (!API_BASE_URL) {
    setImportStatus('API_BASE_URL が未設定です (デプロイ前)', 'error');
    return;
  }
  if (!key) {
    setImportStatus('アップロードキーが未設定。 #key=... 付き URL からアクセスしてください', 'error');
    return;
  }
  setImportStatus('アップロード中…', 'info');
  try {
    const res = await fetch(`${API_BASE_URL}/api/upload?month=${payload.month}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Upload-Key': key,
      },
      body: JSON.stringify(payload),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error + (json.detail ? ': ' + json.detail : ''));
    setImportStatus(`アップロード成功: ${payload.month} に ${json.count} 件保存。 リロードで反映`, 'success');
    // Refresh if uploaded month is current
    if (payload.month === CURRENT_MONTH) {
      setTimeout(() => loadMonth(CURRENT_MONTH), 500);
    }
    checkNewChanges();
  } catch (e) {
    setImportStatus('アップロード失敗: ' + e.message, 'error');
  }
}

bootstrap();
