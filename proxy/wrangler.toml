name = "ballet-schedule-api"
main = "worker.js"
compatibility_date = "2026-05-18"

# KV namespace (アップロードされた events を保存)
# `wrangler kv:namespace create BALLET_KV` で作成して ID をここに貼る
[[kv_namespaces]]
binding = "BALLET_KV"
id = "74fa7db676d84ae69599ecb923ed2d8f"

# Secret は CLI で個別設定:
#   wrangler secret put UPLOAD_KEY
# (アップロード用パスワード、 家族と共有する URL ハッシュ に同じ値を使う)
