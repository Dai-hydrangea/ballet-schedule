<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="description" content="バレエスタジオ予定表">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>バレエスタジオ予定表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fef7f4;
    --bg-soft: #fdeee6;
    --fg: #5a4248;
    --muted: #b39397;
    --line: #f5dde2;
    --line-soft: #fbeef1;
    --card: #ffffff;
    --accent: #e88aa5;
    --accent-soft: #fde0e6;
    --accent-deep: #c96985;
    --sun: #e69090;
    --sat: #95acd0;
    --shadow-soft: 0 2px 10px rgba(232, 138, 165, 0.10);
    --hour-h: 36px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', 'ヒラギノ丸ゴ ProN W4', 'Quicksand', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15px; line-height: 1.55;
    -webkit-text-size-adjust: 100%;
    letter-spacing: 0.01em;
  }

  header.app-head {
    padding: 6px 10px 8px;
    background: linear-gradient(180deg, #fff5f7 0%, var(--card) 100%);
    border-bottom: 1px solid var(--line);
  }
  .app-title-line {
    text-align: center;
    font-size: 11px;
    color: var(--accent-deep);
    letter-spacing: 0.16em;
    font-weight: 500;
    padding: 2px 0 6px;
    line-height: 1;
  }
  .app-title-line::before { content: "♪ "; opacity: 0.6; }
  .app-title-line::after  { content: " ♪"; opacity: 0.6; }
  .app-head-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 6px;
    align-items: center;
  }
  .app-head-side {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-width: 0;
  }
  .month-nav button {
    background: var(--card);
    border: 1.5px solid var(--accent-soft);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 16px;
    color: var(--accent-deep);
    cursor: pointer;
    font-family: inherit;
    min-width: 44px;
    line-height: 1;
    transition: all 0.15s;
    box-shadow: var(--shadow-soft);
  }
  .month-nav button:active {
    background: var(--accent-soft);
    transform: scale(0.96);
  }
  .month-nav button:disabled {
    color: var(--line);
    border-color: var(--line);
    cursor: default;
    box-shadow: none;
  }
  .month-current {
    flex: 1;
    text-align: center;
  }
  h1.month-label {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--accent-deep);
    font-family: 'Quicksand', 'M PLUS Rounded 1c', 'Hiragino Maru Gothic ProN', sans-serif;
  }
  .month-meta { margin-top: 2px; font-size: 10px; color: var(--muted); }

  /* Filters */
  .filters {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    padding: 0 14px;
  }
  details { padding: 6px 0; }
  summary {
    cursor: pointer;
    font-size: 13px; color: var(--muted);
    list-style: none;
    user-select: none;
    padding: 4px 0;
    display: flex; align-items: center; gap: 6px;
  }
  summary::-webkit-details-marker { display: none; }
  .toggle-icon {
    display: inline-block;
    width: 14px;
    text-align: center;
    transition: transform 0.15s;
    color: var(--muted);
  }
  details[open] > summary .toggle-icon { transform: rotate(90deg); }
  .filter-group { margin-top: 6px; }
  .filter-title-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 5px; gap: 8px;
  }
  .filter-title {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .filter-actions { display: flex; gap: 4px; }
  .filter-actions button {
    background: none;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
  }
  .filter-buttons {
    display: flex; flex-wrap: wrap; gap: 5px;
    padding-bottom: 6px;
  }
  .chip {
    border: 1.5px solid var(--line);
    background: var(--card);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-family: inherit;
    color: var(--muted);
    transition: all 0.15s;
  }
  .chip.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .chip[data-color] {
    border-left: 4px solid var(--chip-color, var(--line));
    padding-left: 10px;
  }
  .chip[data-color].active {
    background: var(--chip-color);
    color: white;
    border-color: var(--chip-color);
  }

  /* Main: big calendar */
  main {
    padding: 6px 6px 16px;
    max-width: 720px;
    margin: 0 auto;
  }
  .cal-head-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 3px;
    padding: 4px 0 2px;
  }
  .cal-head {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .cal-head.sun { color: var(--sun); }
  .cal-head.sat { color: var(--sat); }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-cell {
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    min-height: 76px;
    padding: 5px 5px 4px;
    display: flex;
    flex-direction: column;
    font-size: 11px;
    cursor: pointer;
    position: relative;
    transition: transform 0.12s, background 0.12s, box-shadow 0.15s;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(232, 138, 165, 0.04);
  }
  .cal-cell.empty {
    background: transparent;
    border: none;
    cursor: default;
    box-shadow: none;
  }
  .cal-cell.no-events {
    cursor: default;
    background: var(--bg-soft);
    border-color: var(--line-soft);
    box-shadow: none;
  }
  .cal-cell.no-events .day-num { color: var(--muted); font-weight: 400; }
  .cal-cell.addable {
    cursor: pointer;
    background: var(--bg-soft);
    border: 1.5px dashed var(--line);
  }
  .cal-cell.addable:active {
    background: var(--accent-soft);
    transform: scale(0.97);
  }
  .cal-cell.addable .day-num { color: var(--muted); font-weight: 500; }
  .cal-cell.addable::after {
    content: "+";
    position: absolute;
    bottom: 4px; right: 6px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    opacity: 0.6;
  }
  .cal-cell.has-events:active {
    transform: scale(0.96);
    background: var(--line-soft);
  }
  .cal-cell.today {
    border-color: var(--accent);
    border-width: 2.5px;
    padding: 4px 4px 3px;
    box-shadow: 0 2px 12px rgba(232, 138, 165, 0.25);
  }
  .cal-cell.today .day-num { color: var(--accent-deep); }
  .cal-cell .day-num {
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 3px;
  }
  .cal-cell .day-num.sun { color: var(--sun); }
  .cal-cell .day-num.sat { color: var(--sat); }
  .cal-cell .ev-line {
    font-size: 9px;
    line-height: 1.3;
    border-left: 3px solid var(--studio-color);
    background: var(--studio-bg);
    padding: 2px 5px;
    border-radius: 6px;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--fg);
  }
  .cal-cell .ev-more {
    font-size: 9px;
    color: var(--muted);
    text-align: right;
    margin-top: auto;
    padding-top: 2px;
  }
  .cal-cell.exception::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: repeating-linear-gradient(
      135deg,
      transparent 0 4px,
      rgba(0,0,0,0.05) 4px 5px
    );
    pointer-events: none;
    border-radius: 4px;
  }

  /* Bottom sheet */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease-out;
  }
  .sheet-backdrop.show {
    opacity: 1;
    pointer-events: auto;
  }
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--card);
    border-top: 4px solid var(--accent);
    border-radius: 22px 22px 0 0;
    padding: 12px 18px calc(22px + env(safe-area-inset-bottom));
    z-index: 101;
    transform: translateY(calc(100% + 60px));
    visibility: hidden;
    transition: transform 0.28s cubic-bezier(0.2, 0.7, 0.3, 1), visibility 0s linear 0.28s;
    box-shadow: 0 -10px 36px rgba(232, 138, 165, 0.18);
    max-height: 88vh;
    overflow-y: auto;
    overscroll-behavior: contain;
  }
  .sheet.show {
    transform: translateY(0);
    visibility: visible;
    transition: transform 0.28s cubic-bezier(0.2, 0.7, 0.3, 1), visibility 0s;
  }
  @media (min-width: 600px) {
    .sheet {
      max-width: 600px;
      left: 50%;
      transform: translate(-50%, calc(100% + 80px));
      border-radius: 18px;
      bottom: 16px;
    }
    .sheet.show { transform: translate(-50%, 0); }
  }
  .sheet-handle {
    width: 44px; height: 4px;
    border-radius: 2px;
    background: var(--accent-soft);
    margin: 0 auto 12px;
  }
  .sheet-close {
    position: absolute;
    top: 8px; right: 10px;
    background: none; border: none;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    padding: 6px 8px;
    line-height: 1;
  }
  .sheet-day-head {
    margin-bottom: 12px;
  }
  .sheet-day-num {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
    display: flex; align-items: baseline; gap: 8px;
    color: var(--accent-deep);
    font-family: 'Quicksand', 'M PLUS Rounded 1c', sans-serif;
  }
  .sheet-day-num.sun { color: var(--sun); }
  .sheet-day-num.sat { color: var(--sat); }
  .sheet-day-num .wd {
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
  }
  .sheet-day-summary {
    margin-top: 2px;
    font-size: 12px;
    color: var(--muted);
  }
  .sheet-empty {
    padding: 16px 0;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* Allday */
  .allday-list { margin-bottom: 8px; }
  .allday-block {
    background: var(--studio-bg);
    border-left: 4px solid var(--studio-color);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 13px;
    margin-bottom: 5px;
  }
  .allday-block .lbl { font-weight: 600; }
  .allday-block .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Time grid (two-column: left=kawagoe/joint/miyoshino, right=tokorozawa) */
  .time-sides-head {
    display: grid;
    grid-template-columns: 36px 1fr 1fr;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    background: var(--accent-soft);
    border: 1.5px solid var(--line);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    padding: 6px 0 5px;
    font-weight: 500;
  }
  .time-sides-head .side-label {
    padding: 0 4px;
    border-left: 1px solid var(--line-soft);
  }
  .time-sides-head .side-label:first-of-type { border-left: none; }
  .time-grid {
    display: grid;
    grid-template-columns: 36px 1fr 1fr;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    padding: 12px 0;
  }
  .time-axis { position: relative; border-right: 1px solid var(--line); }
  .time-mark {
    position: absolute;
    width: 100%;
    text-align: right;
    padding-right: 5px;
    font-size: 9px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    transform: translateY(-7px);
  }
  .time-content { position: relative; }
  .time-content.side-L { border-right: 1px dashed var(--line); }
  .grid-line {
    position: absolute;
    left: 0; right: 0;
    height: 0;
    border-top: 1px solid var(--line-soft);
    pointer-events: none;
  }
  .time-block {
    position: absolute;
    background: var(--studio-bg);
    border-left: 3px solid var(--studio-color);
    border-radius: 6px;
    padding: 3px 5px;
    font-size: 10px;
    overflow: visible;
    line-height: 1.2;
    min-height: 14px;
  }
  .time-block .blk-time {
    font-variant-numeric: tabular-nums;
    font-size: 9px;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
  }
  .time-block .blk-label {
    font-weight: 500;
    font-size: 10px;
    margin-top: 1px;
    white-space: nowrap;
  }
  .time-block.tight { padding: 1px 4px; }
  .time-block.tight .blk-time,
  .time-block.tight .blk-label {
    display: inline-block;
    vertical-align: middle;
    margin-top: 0;
  }
  .time-block.tight .blk-label { margin-left: 4px; }
  .time-block .blk-sym {
    display: inline-block;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--studio-color); color: white;
    text-align: center; line-height: 11px;
    font-size: 7px; font-weight: 700;
    margin-right: 2px;
    vertical-align: middle;
  }

  /* Notes list inside sheet */
  .notes-list {
    margin-top: 16px;
    padding: 12px 14px;
    background: var(--accent-soft);
    border-radius: 12px;
  }
  .notes-list-title {
    font-size: 10px;
    color: var(--accent-deep);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .note-item {
    font-size: 12px;
    line-height: 1.5;
    margin-bottom: 4px;
    color: var(--fg);
  }
  .note-item strong {
    color: var(--accent-deep);
    font-weight: 600;
  }

  /* Footer */
  footer {
    padding: 16px 16px 32px;
    border-top: 1px solid var(--line);
    background: linear-gradient(180deg, var(--card) 0%, #fff5f7 100%);
    margin-top: 16px;
  }
  .legend-title {
    font-size: 10px; color: var(--accent-deep);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 6px;
    font-weight: 600;
  }
  footer a {
    color: var(--accent-deep);
    text-decoration: underline;
    text-decoration-color: var(--accent);
    text-underline-offset: 2px;
  }
  footer a:hover { color: var(--accent); }
  .legend {
    display: flex; flex-wrap: wrap; gap: 6px 12px;
    margin-bottom: 10px;
    font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-item .swatch {
    width: 12px; height: 12px;
    border-radius: 3px;
    border-left: 4px solid var(--studio-color);
    background: var(--studio-bg);
  }
  .legend-types { font-size: 11px; color: var(--muted); }
  .notes ul { margin: 0; padding-left: 18px; }
  .notes li { margin-bottom: 2px; font-size: 12px; color: var(--muted); }

  @media (min-width: 600px) {
    body { font-size: 16px; }
    :root { --hour-h: 40px; }
    .cal-cell { min-height: 96px; }
    .cal-cell .ev-line { font-size: 10px; }
  }

  /* ─── Import modal ─── */
  /* Header pill-shaped buttons */
  .pill-btn {
    background: var(--card);
    border: 1.5px solid var(--accent-soft);
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--accent-deep);
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    box-shadow: var(--shadow-soft);
    white-space: nowrap;
    line-height: 1;
    display: none;
  }
  .pill-btn.visible { display: inline-flex; align-items: center; gap: 4px; }
  .pill-btn:active { background: var(--accent-soft); }
  .pill-btn.news-btn {
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-color: var(--accent);
    font-weight: 600;
  }
  .pill-btn.news-btn.has-new {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    animation: news-pulse 2s ease-in-out infinite;
  }
  @keyframes news-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232, 138, 165, 0.5); }
    50%      { box-shadow: 0 0 0 6px rgba(232, 138, 165, 0); }
  }
  .pill-btn.menu-btn {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: 600;
  }
  .pill-btn.menu-btn:active { filter: brightness(0.92); }

  /* Menu sheet (combines add + import) */
  .menu-options {
    display: grid;
    gap: 12px;
    margin: 14px 0 6px;
  }
  .menu-option {
    background: var(--card);
    border: 2px solid var(--accent-soft);
    border-radius: 14px;
    padding: 18px 16px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 12px;
    align-items: center;
  }
  .menu-option:active {
    background: var(--accent-soft);
    transform: scale(0.98);
  }
  .menu-option-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
  }
  .menu-option-body { min-width: 0; }
  .menu-option-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--fg);
  }
  .menu-option-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
  }

  /* Add-event sheet specific */
  .add-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .add-form .field-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .add-form label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .add-form input[type="date"],
  .add-form input[type="time"],
  .add-form input[type="text"],
  .add-form select,
  .add-form textarea {
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
    background: var(--card);
    color: var(--fg);
  }
  .add-form input:focus,
  .add-form select:focus,
  .add-form textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .add-form .time-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 6px;
    align-items: center;
  }
  .add-form .time-row > span { color: var(--muted); text-align: center; }
  .add-form textarea { resize: vertical; min-height: 40px; }

  /* Time wheel picker (uses <select>×2, iOS shows native scroll wheel) */
  .time-wheel {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg-soft);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 4px 6px;
    justify-content: center;
  }
  .time-wheel:focus-within {
    border-color: var(--accent);
  }
  .time-wheel select {
    border: none;
    background: var(--card);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 20px;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: var(--accent-deep);
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    text-align: center;
    text-align-last: center;
    cursor: pointer;
    min-width: 60px;
  }
  .time-wheel select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .time-wheel .colon {
    font-size: 18px;
    font-weight: 700;
    color: var(--muted);
    margin: 0 -2px;

<script>
'use strict';

const WEEKDAY_JP = ['日','月','火','水','木','金','土'];

function isoLocal(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

const TODAY_ISO = isoLocal(new Date());
const TIME_START_HOUR = 8;
const TIME_END_HOUR = 22;
const TIME_START_MIN = TIME_START_HOUR * 60;
const TIME_END_MIN = TIME_END_HOUR * 60;
const LEFT_STUDIOS = ['kawagoe', 'miyoshino', 'joint'];
const RIGHT_STUDIOS = ['tokorozawa'];

let META = null;
let MONTH_DATA = null;
let CURRENT_MONTH = null; // "YYYY-MM"
let HOUR_HEIGHT = 36;

const BUILD_VERSION = '20260518-v5';
const MONTH_RANGE_MIN = '2026-04';
const MONTH_RANGE_MAX = '2030-12';

// Cloudflare Worker URL
const API_BASE_URL = 'https://ballet-schedule-api.daisaku-seto.workers.dev';
const UPLOAD_KEY_STORAGE = 'ballet-upload-key';

let CURRENT_PREVIEW = null; // { month, events, mode: 'merge'|'replace' }

const filterState = {
  studios: new Set(),
  types: new Set(),
  pieces: new Set(),
};

async function bootstrap() {
  try {
    const metaRes = await fetch(`./meta.json?v=${BUILD_VERSION}`, { cache: 'no-store' });
    META = await metaRes.json();
    HOUR_HEIGHT = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--hour-h')) || 36;

    Object.keys(META.studios).forEach(k => filterState.studios.add(k));
    Object.keys(META.types).forEach(k => filterState.types.add(k));

    buildLegend();
    buildNotes();
    bindSheet();
    bindMonthNav();
    bindSwipe();
    bindImportModal();
    bindAddModal();
    bindTplModal();
    bindNewsModal();
    renderCalendarHeads();

    const initialMonth = pickInitialMonth();
    await loadMonth(initialMonth);
    // Check for new changes after the initial month is loaded
    checkNewChanges();
  } catch (e) {
    document.getElementById('month-label').textContent = '読み込みエラー';
    console.error(e);
  }
}

function pickInitialMonth() {
  const today = new Date();
  const ym = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2, '0');
  if (ym < MONTH_RANGE_MIN) return MONTH_RANGE_MIN;
  if (ym > MONTH_RANGE_MAX) return MONTH_RANGE_MAX;
  return ym;
}

async function loadMonth(yyyy_mm) {
  CURRENT_MONTH = yyyy_mm;
  document.getElementById('month-label').textContent = formatMonthLabel(yyyy_mm);
  document.getElementById('month-meta').textContent = '読み込み中…';
  updateNavButtons();

  let data = null;
  let source = '';

  // 1. Try Worker API first (KV-backed, latest uploads)
  if (API_BASE_URL) {
    try {
      const res = await fetch(`${API_BASE_URL}/api/data/${yyyy_mm}`, { cache: 'no-store' });
      if (res.ok) {
        data = await res.json();
        source = 'KV';
      }
    } catch (e) { /* fall through to static */ }
  }

  // 2. Fallback to static file in repo
  if (!data) {
    try {
      const res = await fetch(`./data/${yyyy_mm}.json?v=${BUILD_VERSION}`, { cache: 'no-store' });
      if (res.ok) {
        data = await res.json();
        source = 'static';
      }
    } catch (e) { /* empty */ }
  }

  MONTH_DATA = data || makeEmptyMonth(yyyy_mm);

  document.getElementById('month-meta').textContent =
    MONTH_DATA.events.length > 0
      ? `予定 ${MONTH_DATA.events.length} 件  ·  ${MONTH_DATA.source || (source === 'KV' ? 'KV upload' : '出典未記載')}`
      : 'この月の予定はまだ登録されていません';

  const allPieces = collectPieces();
  filterState.pieces = new Set(allPieces);
  buildFilters(allPieces);
  bindFilterActions();
  render();
}

function makeEmptyMonth(yyyy_mm) {
  return {
    month: yyyy_mm,
    month_label: formatMonthLabel(yyyy_mm),
    generated_at: '',
    source: '',
    events: []
  };
}

function formatMonthLabel(yyyy_mm) {
  const [y, m] = yyyy_mm.split('-').map(Number);
  return `${y}年${m}月`;
}

function navigateMonth(delta) {
  const [y, m] = CURRENT_MONTH.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  const target = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}`;
  if (target < MONTH_RANGE_MIN || target > MONTH_RANGE_MAX) return;
  loadMonth(target);
}

function updateNavButtons() {
  const [y, m] = CURRENT_MONTH.split('-').map(Number);
  const prevD = new Date(y, m - 2, 1);
  const nextD = new Date(y, m, 1);
  const prev = `${prevD.getFullYear()}-${String(prevD.getMonth()+1).padStart(2, '0')}`;
  const next = `${nextD.getFullYear()}-${String(nextD.getMonth()+1).padStart(2, '0')}`;
  document.getElementById('prev-month').disabled = prev < MONTH_RANGE_MIN;
  document.getElementById('next-month').disabled = next > MONTH_RANGE_MAX;
}

function bindMonthNav() {
  document.getElementById('prev-month').addEventListener('click', () => navigateMonth(-1));
  document.getElementById('next-month').addEventListener('click', () => navigateMonth(+1));
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft') navigateMonth(-1);
    else if (e.key === 'ArrowRight') navigateMonth(+1);
  });
}

function bindSwipe() {
  const main = document.querySelector('main');
  let sx = 0, sy = 0, tracking = false;
  main.addEventListener('touchstart', (e) => {
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    tracking = true;
  }, { passive: true });
  main.addEventListener('touchend', (e) => {
    if (!tracking) return;
    tracking = false;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > 60 && Math.abs(dy) < 40) {
      if (dx > 0) navigateMonth(-1);
      else navigateMonth(+1);
    }
  }, { passive: true });
}

function collectPieces() {
  const set = new Set();
  for (const ev of MONTH_DATA.events) (ev.tags || []).forEach(t => set.add(t));
  return [...set].sort((a,b) => a.localeCompare(b, 'ja'));
}

function buildFilters(pieces) {
  const studioWrap = document.getElementById('studio-filters');
  studioWrap.innerHTML = '';
  for (const [key, s] of Object.entries(META.studios)) {
    const btn = document.createElement('button');
    btn.className = 'chip active';
    btn.dataset.color = '';
    btn.style.setProperty('--chip-color', s.color);
    btn.textContent = s.name;
    btn.addEventListener('click', () => toggleFilter('studios', key, btn));
    studioWrap.appendChild(btn);
  }

  const typeWrap = document.getElementById('type-filters');
  typeWrap.innerHTML = '';
  for (const [key, t] of Object.entries(META.types)) {
    const btn = document.createElement('button');
    btn.className = 'chip active';
    btn.textContent = t.symbol + '  ' + t.name;
    btn.addEventListener('click', () => toggleFilter('types', key, btn));
    typeWrap.appendChild(btn);
  }

  const pieceWrap = document.getElementById('piece-filters');
  pieceWrap.innerHTML = '';
  if (pieces.length === 0) {
    pieceWrap.innerHTML = '<span style="font-size:12px;color:var(--muted)">演目タグなし</span>';
  } else {
    for (const p of pieces) {
      const btn = document.createElement('button');
      btn.className = 'chip active';
      btn.textContent = p;
      btn.addEventListener('click', () => toggleFilter('pieces', p, btn));
      pieceWrap.appendChild(btn);
    }
  }
}

function bindFilterActions() {
  document.querySelectorAll('.filter-actions button').forEach(btn => {
    btn.addEventListener('click', () => {
      const group = btn.dataset.group;
      const action = btn.dataset.action;
      const wrapId = group === 'studios' ? 'studio-filters'
                   : group === 'types' ? 'type-filters'
                   : 'piece-filters';
      const wrap = document.getElementById(wrapId);
      const chips = wrap.querySelectorAll('.chip');

      if (group === 'studios' || group === 'types') {
        const keys = Object.keys(group === 'studios' ? META.studios : META.types);
        if (action === 'all') {
          filterState[group] = new Set(keys);
          chips.forEach(c => c.classList.add('active'));
        } else {
          filterState[group] = new Set();
          chips.forEach(c => c.classList.remove('active'));
        }
      } else {
        const pieces = collectPieces();
        if (action === 'all') {
          filterState.pieces = new Set(pieces);
          chips.forEach(c => c.classList.add('active'));
        } else {
          filterState.pieces = new Set();
          chips.forEach(c => c.classList.remove('active'));
        }
      }
      render();
    });
  });
}

function toggleFilter(group, key, btn) {
  if (filterState[group].has(key)) {
    filterState[group].delete(key);
    btn.classList.remove('active');
  } else {
    filterState[group].add(key);
    btn.classList.add('active');
  }
  render();
}

function buildLegend() {
  const wrap = document.getElementById('legend');
  wrap.innerHTML = '';
  for (const s of Object.values(META.studios)) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.style.setProperty('--studio-color', s.color);
    item.style.setProperty('--studio-bg', s.bg);
    item.innerHTML = '<span class="swatch"></span>' + s.name;
    wrap.appendChild(item);
  }
  const types = document.getElementById('legend-types');
  types.textContent = Object.values(META.types)
    .map(t => t.symbol + ' = ' + t.name)
    .join('   ·   ');
}

function buildNotes() {
  const wrap = document.getElementById('notes');
  wrap.innerHTML = '';
  if (!META.notes_global || META.notes_global.length === 0) return;
  const ul = document.createElement('ul');
  for (const n of META.notes_global) {
    const li = document.createElement('li');
    li.innerHTML = autolink(escapeHtml(n));
    ul.appendChild(li);
  }
  wrap.appendChild(ul);
}

function autolink(text) {
  return text.replace(
    /(https?:\/\/[^\s<>"']+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
  );
}

function parseTimeMin(s) {
  if (!s) return null;
  const [h, m] = s.split(':').map(Number);
  return h * 60 + m;
}

function eventsForDate(iso) {
  return MONTH_DATA.events.filter(ev => ev.date === iso);
}

function passesFilter(item) {
  if (!filterState.studios.has(item.studio)) return false;
  if (!filterState.types.has(item.type)) return false;
  if (item.tags && item.tags.length > 0) {
    if (!item.tags.some(t => filterState.pieces.has(t))) return false;
  }
  return true;
}

function buildMonthDates() {
  const [y, m] = MONTH_DATA.month.split('-').map(Number);
  const first = new Date(y, m - 1, 1);
  const last = new Date(y, m, 0);
  const dates = [];
  for (let d = 1; d <= last.getDate(); d++) {
    dates.push(new Date(y, m - 1, d));
  }
  return { first, last, dates };
}

function isAllDay(it) {
  const s = parseTimeMin(it.start);
  const e = parseTimeMin(it.end);
  return s === 0 && e >= 23 * 60;
}

function render() {
  renderCalendar();
}

function renderCalendarHeads() {
  const root = document.getElementById('cal-head-row');
  root.innerHTML = '';
  ['日','月','火','水','木','金','土'].forEach((w, i) => {
    const h = document.createElement('div');
    h.className = 'cal-head' + (i === 0 ? ' sun' : i === 6 ? ' sat' : '');
    h.textContent = w;
    root.appendChild(h);
  });
}

function renderCalendar() {
  const root = document.getElementById('cal-grid');
  root.innerHTML = '';
  const { first, dates } = buildMonthDates();

  for (let i = 0; i < first.getDay(); i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-cell empty';
    root.appendChild(empty);
  }

  for (const date of dates) {
    const cell = document.createElement('div');
    const iso = isoLocal(date);
    const wd = date.getDay();
    const visible = eventsForDate(iso).filter(passesFilter);
    const hasAllDayException = visible.some(it => it.type === 'choreography' && isAllDay(it));

    cell.className = 'cal-cell';
    if (iso === TODAY_ISO) cell.classList.add('today');
    if (hasAllDayException) cell.classList.add('exception');
    if (visible.length > 0) cell.classList.add('has-events');
    else cell.classList.add('no-events');

    const num = document.createElement('div');
    num.className = 'day-num' + (wd === 0 ? ' sun' : wd === 6 ? ' sat' : '');
    num.textContent = date.getDate();
    cell.appendChild(num);

    if (visible.length > 0) {
      const sorted = [...visible].sort((a,b) => (a.start||'').localeCompare(b.start||''));
      const MAX_LINES = 2;
      for (const it of sorted.slice(0, MAX_LINES)) {
        const studio = META.studios[it.studio];
        const line = document.createElement('div');
        line.className = 'ev-line';
        line.style.setProperty('--studio-color', studio.color);
        line.style.setProperty('--studio-bg', studio.bg);
        const timeStr = isAllDay(it) ? '終日' : it.start;
        line.textContent = `${timeStr} ${it.label}`;
        cell.appendChild(line);
      }
      if (sorted.length > MAX_LINES) {
        const more = document.createElement('div');
        more.className = 'ev-more';
        more.textContent = '+' + (sorted.length - MAX_LINES);
        cell.appendChild(more);
      }
    }

    // Tap to open day sheet
    // - With events: anyone can tap (view mode)
    // - Without events: only those with upload key (edit mode)
    if (visible.length > 0) {
      cell.addEventListener('click', () => openDaySheet(date));
    } else if (getUploadKey() && API_BASE_URL) {
      cell.style.cursor = 'pointer';
      cell.classList.remove('no-events');
      cell.classList.add('addable');
      cell.addEventListener('click', () => openDaySheet(date));
    }
    root.appendChild(cell);
  }
}

/* ============ Bottom sheet (per-day) ============ */

function openDaySheet(date) {
  const iso = isoLocal(date);
  const wd = date.getDay();
  const visible = eventsForDate(iso)
    .filter(passesFilter)
    .sort((a,b) => (a.start||'').localeCompare(b.start||''));

  const content = document.getElementById('sheet-content');
  content.innerHTML = '';

  const head = document.createElement('div');
  head.className = 'sheet-day-head';
  const numCls = wd === 0 ? ' sun' : wd === 6 ? ' sat' : '';
  head.innerHTML = `
    <div class="sheet-day-num${numCls}">
      <span>${date.getMonth()+1}月${date.getDate()}日</span>
      <span class="wd">${WEEKDAY_JP[wd]}</span>
    </div>
    <div class="sheet-day-summary">${visible.length === 0 ? '予定なし' : `予定 ${visible.length} 件`}</div>
  `;
  // 「まとめて編集」 ボタン (権限あれば) — タップ即編集と併存
  if (getUploadKey() && API_BASE_URL) {
    const editBtn = document.createElement('button');
    editBtn.className = 'edit-day-btn';
    editBtn.textContent = 'まとめて編集';
    editBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      enterEditMode(date);
    });
    head.querySelector('.sheet-day-num').appendChild(editBtn);
  }
  content.appendChild(head);

  const hasEditPermission = !!(getUploadKey() && API_BASE_URL);

  if (visible.length === 0) {
    if (hasEditPermission) {
      // Show empty grid so users can tap-to-add at any time slot
      const hint = document.createElement('div');
      hint.className = 'sheet-day-summary';
      hint.style.marginBottom = '6px';
      hint.style.color = 'var(--accent-deep)';
      hint.textContent = '時間帯をタップして予定を追加';
      content.appendChild(hint);
      content.appendChild(buildTimeGrid([], date));
    } else {
      const empty = document.createElement('div');
      empty.className = 'sheet-empty';
      empty.textContent = '予定なし';
      content.appendChild(empty);
    }
    showSheet();
    return;
  }

  const inRange = [], outOfRange = [];
  for (const it of visible) {
    const s = parseTimeMin(it.start);
    const e = parseTimeMin(it.end);
    if (s == null || e == null || e <= TIME_START_MIN || s >= TIME_END_MIN || isAllDay(it)) {
      outOfRange.push(it);
    } else {
      inRange.push(it);
    }
  }

  if (outOfRange.length > 0) {
    const wrap = document.createElement('div');
    wrap.className = 'allday-list';
    for (const it of outOfRange) wrap.appendChild(buildAllDayBlock(it));
    content.appendChild(wrap);
  }

  // 時間軸グリッドは常に表示 (権限ありなら空エリアタップで追加可)
  if (inRange.length > 0 || hasEditPermission) {
    content.appendChild(buildTimeGrid(inRange, date));
  }

  const withNotes = visible.filter(it => it.note);
  if (withNotes.length > 0) {
    const wrap = document.createElement('div');
    wrap.className = 'notes-list';
    wrap.innerHTML = '<div class="notes-list-title">メモ</div>';
    for (const it of withNotes) {
      const n = document.createElement('div');
      n.className = 'note-item';
      n.innerHTML = `<strong>${escapeHtml(it.label)}</strong>: ${escapeHtml(it.note)}`;
      wrap.appendChild(n);
    }
    content.appendChild(wrap);
  }

  showSheet();
}

function buildAllDayBlock(it) {
  const studio = META.studios[it.studio];
  const type = META.types[it.type];
  const div = document.createElement('div');
  div.className = 'allday-block';
  div.style.setProperty('--studio-color', studio.color);
  div.style.setProperty('--studio-bg', studio.bg);
  div.innerHTML = `
    <div class="lbl">${escapeHtml(it.label)}</div>
    <div class="meta">${type.symbol} ${type.name} · ${escapeHtml(studio.name)}${it.target ? '  ·  ' + escapeHtml(it.target) : ''}</div>
  `;
  return div;
}

function sideOf(studio) {
  return RIGHT_STUDIOS.includes(studio) ? 'R' : 'L';
}

function assignSubColumns(items) {
  const cols = [];
  for (const it of items) {
    const s = parseTimeMin(it.start);
    let placed = false;
    for (let i = 0; i < cols.length; i++) {
      if (cols[i] <= s) {
        cols[i] = parseTimeMin(it.end);
        it._sub = i;
        placed = true;
        break;
      }
    }
    if (!placed) {
      it._sub = cols.length;
      cols.push(parseTimeMin(it.end));
    }
  }
  const max = Math.max(cols.length, 1);
  for (const it of items) it._subMax = max;
  return items;
}

function buildTimeGrid(items, date) {
  items.sort((a,b) => parseTimeMin(a.start) - parseTimeMin(b.start));
  const leftItems = items.filter(it => sideOf(it.studio) === 'L');
  const rightItems = items.filter(it => sideOf(it.studio) === 'R');
  assignSubColumns(leftItems);
  assignSubColumns(rightItems);

  const totalHours = TIME_END_HOUR - TIME_START_HOUR;
  const totalHeight = totalHours * HOUR_HEIGHT;
  const wrap = document.createDocumentFragment();

  const sideHead = document.createElement('div');
  sideHead.className = 'time-sides-head';
  sideHead.innerHTML = `
    <div></div>
    <div class="side-label">川越 ・ 合同 ・ みよしの</div>
    <div class="side-label">所沢</div>
  `;
  wrap.appendChild(sideHead);

  const grid = document.createElement('div');
  grid.className = 'time-grid';
  grid.style.height = totalHeight + 'px';

  const axis = document.createElement('div');
  axis.className = 'time-axis';
  for (let h = TIME_START_HOUR; h <= TIME_END_HOUR; h++) {
    const mark = document.createElement('div');
    mark.className = 'time-mark';
    mark.style.top = ((h - TIME_START_HOUR) * HOUR_HEIGHT) + 'px';
    mark.textContent = h + ':00';
    axis.appendChild(mark);
  }
  grid.appendChild(axis);

  grid.appendChild(buildSideContent(leftItems, totalHours, 'L', date));
  grid.appendChild(buildSideContent(rightItems, totalHours, 'R', date));

  wrap.appendChild(grid);

  const container = document.createElement('div');
  container.appendChild(wrap);
  return container;
}

function buildSideContent(items, totalHours, side, date) {
  const content = document.createElement('div');
  content.className = 'time-content side-' + side;
  const hasEditPermission = !!(getUploadKey() && API_BASE_URL);

  for (let h = 1; h < totalHours; h++) {
    const line = document.createElement('div');
    line.className = 'grid-line';
    line.style.top = (h * HOUR_HEIGHT) + 'px';
    content.appendChild(line);
  }

  // 空きエリアタップ → 新規追加 (権限ありの場合)
  if (hasEditPermission && date) {
    content.style.cursor = 'pointer';
    content.addEventListener('click', (e) => {
      // 既存ブロックタップは別ハンドラで処理されるため、 ここでは空きエリアのみ
      if (e.target.closest('.time-block')) return;
      const rect = content.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const minutesFromStart = Math.max(0, Math.round((y / HOUR_HEIGHT) * 60 / 15) * 15);
      const startMin = TIME_START_MIN + minutesFromStart;
      const sh = Math.floor(startMin / 60);
      const sm = startMin % 60;
      const startStr = `${String(sh).padStart(2,'0')}:${String(sm).padStart(2,'0')}`;
      const defaultStudio = side === 'R' ? 'tokorozawa' : 'kawagoe';
      closeSheet();
      openAddSheet({
        date: isoLocal(date),
        start: startStr,
        end: addMinutes(startStr, 60),
        defaultStudio,
      });
    });
  }

  for (const it of items) {
    const studio = META.studios[it.studio];
    const type = META.types[it.type];
    const startMin = Math.max(parseTimeMin(it.start), TIME_START_MIN);
    const endMin = Math.min(parseTimeMin(it.end), TIME_END_MIN);
    const top = ((startMin - TIME_START_MIN) / 60) * HOUR_HEIGHT;
    const height = Math.max(((endMin - startMin) / 60) * HOUR_HEIGHT - 1, 14);
    const subWidth = 100 / it._subMax;
    const leftPct = it._sub * subWidth;

    const block = document.createElement('div');
    block.className = 'time-block' + (height < 28 ? ' tight' : '');
    block.style.setProperty('--studio-color', studio.color);
    block.style.setProperty('--studio-bg', studio.bg);
    block.style.top = top + 'px';
    block.style.height = height + 'px';
    block.style.left = `calc(${leftPct}% + 2px)`;
    block.style.width = `calc(${subWidth}% - 4px)`;
    block.style.zIndex = String(5 + it._sub);
    block.innerHTML = `
      <div class="blk-time"><span class="blk-sym">${type.symbol}</span>${it.start}–${it.end}</div>
      <div class="blk-label">${escapeHtml(it.label)}</div>
    `;
    // 既存ブロックタップ → 編集モーダル (権限あれば)
    if (hasEditPermission) {
      block.style.cursor = 'pointer';
      block.addEventListener('click', (e) => {
        e.stopPropagation();
        closeSheet();
        openAddSheet({ editingEvent: it });
      });
    }
    content.appendChild(block);
  }
  return content;
}

function showSheet() {
  const sheet = document.getElementById('sheet');
  const backdrop = document.getElementById('sheet-backdrop');
  sheet.classList.add('show');
  backdrop.classList.add('show');
  sheet.setAttribute('aria-hidden', 'false');
}

function closeSheet() {
  const sheet = document.getElementById('sheet');
  const backdrop = document.getElementById('sheet-backdrop');
  sheet.classList.remove('show');
  backdrop.classList.remove('show');
  sheet.setAttribute('aria-hidden', 'true');
}

function bindSheet() {
  document.getElementById('sheet-close').addEventListener('click', closeSheet);
  document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSheet();
  });
  bindSwipeToDismiss(document.getElementById('sheet'), closeSheet);
}

function bindSwipeToDismiss(sheet, closeCb) {
  let startY = 0;
  let currentY = 0;
  let dragging = false;
  let originalTransition = '';

  // Mobile only (PC は中央配置 + translate(-50%, 0) なのでスワイプ非対応)
  const isMobileLayout = () => window.matchMedia('(max-width: 599px)').matches;

  sheet.addEventListener('touchstart', (e) => {
    if (!isMobileLayout()) return;
    if (sheet.scrollTop > 0) return;          // content scrolling
    if (e.touches.length !== 1) return;
    startY = e.touches[0].clientY;
    currentY = startY;
    dragging = true;
    originalTransition = sheet.style.transition;
    sheet.style.transition = 'none';
  }, { passive: true });

  sheet.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    currentY = e.touches[0].clientY;
    const dy = currentY - startY;
    if (dy > 0) {
      sheet.style.transform = `translateY(${dy}px)`;
    } else {
      sheet.style.transform = '';
    }
  }, { passive: true });

  sheet.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = originalTransition;
    sheet.style.transform = '';
    if (currentY - startY > 80) closeCb();
  });

  sheet.addEventListener('touchcancel', () => {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = originalTransition;
    sheet.style.transform = '';
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

const WHEEL_HOUR_MIN = 7;
const WHEEL_HOUR_MAX = 22;
const WHEEL_MINUTES = [0, 15, 30, 45];

function populateTimeWheels() {
  const ids = ['add-start-hour', 'add-end-hour'];
  for (const id of ids) {
    const sel = document.getElementById(id);
    if (sel.children.length > 0) continue;
    for (let h = WHEEL_HOUR_MIN; h <= WHEEL_HOUR_MAX; h++) {
      const opt = document.createElement('option');
      opt.value = String(h);
      opt.textContent = String(h).padStart(2, '0');
      sel.appendChild(opt);
    }
  }
  const minIds = ['add-start-minute', 'add-end-minute'];
  for (const id of minIds) {
    const sel = document.getElementById(id);
    if (sel.children.length > 0) continue;
    for (const m of WHEEL_MINUTES) {
      const opt = document.createElement('option');
      opt.value = String(m);
      opt.textContent = String(m).padStart(2, '0');
      sel.appendChild(opt);
    }
  }
}

function setWheelTime(prefix, hhmm) {
  const [hStr, mStr] = (hhmm || '13:00').split(':');
  let h = parseInt(hStr, 10);
  let m = parseInt(mStr, 10) || 0;
  // Clamp hour to wheel range
  if (h < WHEEL_HOUR_MIN) h = WHEEL_HOUR_MIN;
  if (h > WHEEL_HOUR_MAX) h = WHEEL_HOUR_MAX;
  // Snap minute to nearest 15
  const snapped = WHEEL_MINUTES.reduce((acc, cur) =>
    Math.abs(cur - m) < Math.abs(acc - m) ? cur : acc, WHEEL_MINUTES[0]);
  document.getElementById(`add-${prefix}-hour`).value = String(h);
  document.getElementById(`add-${prefix}-minute`).value = String(snapped);
}

function getWheelTime(prefix) {
  const h = parseInt(document.getElementById(`add-${prefix}-hour`).value, 10);
  const m = parseInt(document.getElementById(`add-${prefix}-minute`).value, 10);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

async function openAddSheet(opts = {}) {
  // opts.editingEvent: 既存 event を編集 (削除ボタン表示、 タイトル変更)
  // opts.date / opts.start: 新規モードでプリセットしたい時 (例: 「+ 追加」 を空セルから呼ぶ場合)
  const editingEvent = opts.editingEvent || null;
  ADD_SHEET_EDITING = editingEvent;

  const [cy, cm] = CURRENT_MONTH.split('-').map(Number);
  const dateInput = document.getElementById('add-date');
  dateInput.min = `${CURRENT_MONTH}-01`;
  const lastDay = new Date(cy, cm, 0).getDate();
  dateInput.max = `${CURRENT_MONTH}-${String(lastDay).padStart(2,'0')}`;

  if (editingEvent) {
    dateInput.value = editingEvent.date;
    setWheelTime('start', editingEvent.start || '13:00');
    setWheelTime('end', editingEvent.end || '14:00');
    document.getElementById('add-label').value = editingEvent.label || '';
    document.getElementById('add-studio').value = editingEvent.studio || 'kawagoe';
    document.getElementById('add-type').value = editingEvent.type || 'rehearsal';
    document.getElementById('add-note').value = editingEvent.note || '';
    document.getElementById('add-save').textContent = '保存';
    document.getElementById('add-delete').hidden = false;
    document.querySelector('#add-sheet .sheet-day-num span').textContent = '予定の編集';
    document.querySelector('#add-sheet .sheet-day-summary').textContent = '時間・場所・演目・メモ を変更、 または削除';
  } else {
    const today = new Date();
    if (opts.date) {
      dateInput.value = opts.date;
    } else if (today.getFullYear() === cy && today.getMonth() + 1 === cm) {
      dateInput.value = isoLocal(today);
    } else {
      dateInput.value = `${CURRENT_MONTH}-01`;
    }
    setWheelTime('start', opts.start || '13:00');
    setWheelTime('end', opts.end || addMinutes(opts.start || '13:00', 60));
    document.getElementById('add-label').value = '';
    document.getElementById('add-studio').value = 'kawagoe';
    document.getElementById('add-type').value = 'rehearsal';
    document.getElementById('add-note').value = '';
    document.getElementById('add-save').textContent = '追加して保存';
    document.getElementById('add-delete').hidden = true;
    document.querySelector('#add-sheet .sheet-day-num span').textContent = '予定の追加';
    document.querySelector('#add-sheet .sheet-day-summary').textContent = '単発の予定を 0 から登録';
  }
  document.getElementById('add-status').innerHTML = '';

  await fetchTemplates();
  renderTemplateChips();

  const sheet = document.getElementById('add-sheet');
  const backdrop = document.getElementById('add-backdrop');
  sheet.classList.add('show');
  backdrop.classList.add('show');
  sheet.setAttribute('aria-hidden', 'false');
}

function addMinutes(hhmm, n) {
  const [h, m] = hhmm.split(':').map(Number);
  const total = h * 60 + m + n;
  return `${String(Math.floor(total / 60) % 24).padStart(2,'0')}:${String(total % 60).padStart(2,'0')}`;
}

function eventKey(ev) {
  return `${ev.date}|${ev.start}|${ev.end}|${ev.label}|${ev.studio}`;
}

function closeAddSheet() {
  const sheet = document.getElementById('add-sheet');
  const backdrop = document.getElementById('add-backdrop');

  sheet.setAttribute('aria-hidden', 'true');
}

function renderTemplateChips() {

async function saveAddedEvent() {
  const date = document.getElementById('add-date').value;
  const start = getWheelTime('start');
  const end = getWheelTime('end');
  const label = document.getElementById('add-label').value.trim();
  const studio = document.getElementById('add-studio').value;
  const type = document.getElementById('add-type').value;
  const note = document.getElementById('add-note').value.trim();

  const statusEl = document.getElementById('add-status');
  statusEl.innerHTML = '';

  if (!date || !start || !end || !label) {
    setStatus(statusEl, '日付・時刻・演目は必須です', 'error');
    return;
  }
  if (!date.startsWith(CURRENT_MONTH)) {
    setStatus(statusEl, '対象月 (' + formatMonthLabel(CURRENT_MONTH) + ') の範囲で指定してください', 'error');
    return;
  }
  const key = getUploadKey();
  if (!API_BASE_URL || !key) {
    setStatus(statusEl, '権限なし (#key= の URL でアクセスしてください)', 'error');
    return;
  }

  const newEv = { date, start, end, studio, type, label, tags: extractTags(label) };
  if (note) newEv.note = note;

  // 編集モードなら該当 event を置換、 そうでなければ追加
  let newEvents;
  if (ADD_SHEET_EDITING) {
    const editKey = eventKey(ADD_SHEET_EDITING);
    newEvents = (MONTH_DATA.events || []).map(ev => eventKey(ev) === editKey ? newEv : ev);
    // もし key 一致がなかった場合は単純追加
    if (!newEvents.some(ev => eventKey(ev) === eventKey(newEv))) {
      newEvents = [...newEvents, newEv];
    }
  } else {
    newEvents = [...(MONTH_DATA.events || []), newEv];
  }
  newEvents.sort((a,b) => (a.date+a.start).localeCompare(b.date+b.start));

  const payload = {
    month: CURRENT_MONTH,
    month_label: formatMonthLabel(CURRENT_MONTH),
    generated_at: isoLocal(new Date()),
    source: MONTH_DATA.source || (ADD_SHEET_EDITING ? 'edited via app' : 'added via app'),
    events: newEvents,
    prev_version: MONTH_DATA._version,
  };

  setStatus(statusEl, '保存中…', 'info');
  try {
    const res = await fetch(`${API_BASE_URL}/api/upload?month=${CURRENT_MONTH}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Upload-Key': key },
      body: JSON.stringify(payload),
    });
    const json = await res.json();
    if (!res.ok) throw new Error((json.error || '') + (json.detail ? ': ' + json.detail : ''));

    // 元の day sheet を再描画 (もし開いていれば)
    const wasEditing = ADD_SHEET_EDITING;
    closeAddSheet();
    await loadMonth(CURRENT_MONTH);
    if (wasEditing) {
      const [y, m, d] = (wasEditing.date || newEv.date).split('-').map(Number);
      openDaySheet(new Date(y, m - 1, d));
    }
    await checkNewChanges();
  } catch (e) {
    setStatus(statusEl, '保存失敗: ' + e.message, 'error');
  }
}

async function deleteCurrentEvent() {
  if (!ADD_SHEET_EDITING) return;
  const target = ADD_SHEET_EDITING;
  if (!confirm(`「${target.label}」 を削除しますか?`)) return;

  const key = getUploadKey();
  if (!API_BASE_URL || !key) {
    setStatus(document.getElementById('add-status'), '権限なし', 'error');
    return;
  }

  const editKey = eventKey(target);
  const newEvents = (MONTH_DATA.events || []).filter(ev => eventKey(ev) !== editKey);

  const payload = {
    month: CURRENT_MONTH,
    month_label: formatMonthLabel(CURRENT_MONTH),
    generated_at: isoLocal(new Date()),
    source: MONTH_DATA.source || 'deleted via app',
    events: newEvents,
    prev_version: MONTH_DATA._version,
  };

  setStatus(document.getElementById('add-status'), '削除中…', 'info');
  try {
    const res = await fetch(`${API_BASE_URL}/api/upload?month=${CURRENT_MONTH}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Upload-Key': key },
      body: JSON.stringify(payload),
    });
    const json = await res.json();
    if (!res.ok) throw new Error((json.error || '') + (json.detail ? ': ' + json.detail : ''));
    closeAddSheet();
    await loadMonth(CURRENT_MONTH);
    const [y, m, d] = target.date.split('-').map(Number);
    openDaySheet(new Date(y, m - 1, d));
    await checkNewChanges();
  } catch (e) {
    setStatus(document.getElementById('add-status'), '削除失敗: ' + e.message, 'error');
  }
}

function renderTplList() {
  const wrap = document.getElementById('tpl-list');

    wrap.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:10px">テンプレートなし。 ↓ で追加</div>';
    return;
  }
  TPL_EDIT_DRAFT.forEach((t, idx) => {
    const studio = META.studios[t.studio] || { color: 'var(--accent)' };
    const row = document.createElement('div');
    row.className = 'tpl-row';
    row.style.setProperty('--studio-color', studio.color);

    const labelIn = document.createElement('input');
    labelIn.type = 'text';
    labelIn.value = t.label || '';

    labelIn.addEventListener('input', () => { t.label = labelIn.value; });
    row.appendChild(labelIn);

    const studioSel = document.createElement('select');
    for (const [k, v] of Object.entries(META.studios)) {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = v.name;
      if (k === t.studio) opt.selected = true;
      studioSel.appendChild(opt);
    }
    studioSel.addEventListener('change', () => {
      t.studio = studioSel.value;
      const ns = META.studios[t.studio];
      if (ns) row.style.setProperty('--studio-color', ns.color);
    });
    row.appendChild(studioSel);

    const typeSel = document.createElement('select');
    for (const [k, v] of Object.entries(META.types)) {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = v.symbol;
      if (k === t.type) opt.selected = true;
      typeSel.appendChild(opt);
    }
    typeSel.addEventListener('change', () => { t.type = typeSel.value; });
    row.appendChild(typeSel);

    const del = document.createElement('button');
    del.className = 'tpl-del';
    del.textContent = '✕';
    del.addEventListener('click', () => {
      TPL_EDIT_DRAFT.splice(idx, 1);
      renderTplList();
    });
    row.appendChild(del);

    wrap.appendChild(row);
  });
}

async function saveTemplates() {
  const statusEl = document.getElementById('tpl-status');
  for (const t of TPL_EDIT_DRAFT) {
    if (!t.label || !t.label.trim()) {
      setStatus(statusEl, '空の演目名があります', 'error');
      return;
    }
  }
  const key = getUploadKey();
  if (!API_BASE_URL || !key) {
    setStatus(statusEl, '権限なし', 'error');
    return;
  }
  setStatus(statusEl, '保存中…', 'info');
  try {
    const res = await fetch(`${API_BASE_URL}/api/templates`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Upload-Key': key },
      body: JSON.stringify({ items: TPL_EDIT_DRAFT }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'unknown');
    TEMPLATES_CACHE = { items: TPL_EDIT_DRAFT };
    renderTemplateChips();
    closeTplSheet();
    await checkNewChanges();
  } catch (e) {
    setStatus(statusEl, '保存失敗: ' + e.message, 'error');
  }
}

const NEWS_LAST_SEEN_KEY = 'ballet-news-last-seen';
let HISTORY_CACHE = null;

async function fetchHistory(limit = 100) {
  if (!API_BASE_URL) return { entries: [], total: 0 };
  try {
    const res = await fetch(`${API_BASE_URL}/api/history?limit=${limit}`, { cache: 'no-store' });
    if (res.ok) {
      HISTORY_CACHE = await res.json();
      return HISTORY_CACHE;
    }
  } catch (e) {}
  return { entries: [], total: 0 };
}

async function openNewsSheet() {
  const sheet = document.getElementById('news-sheet');

  sheet.classList.add('show');
  backdrop.classList.add('show');
  sheet.setAttribute('aria-hidden', 'false');

  const list = document.getElementById('news-list');
  list.innerHTML = '<div class="news-empty">読み込み中…</div>';
  const data = await fetchHistory(100);
  renderHistory(data.entries);
  markNewsSeen(data.entries);
}

function closeNewsSheet() {
  const sheet = document.getElementById('news-sheet');
  const backdrop = document.getElementById('news-backdrop');
  sheet.classList.remove('show');
  backdrop.classList.remove('show');
  sheet.setAttribute('aria-hidden', 'true');
}

function renderHistory(entries) {
  const list = document.getElementById('news-list');
  list.innerHTML = '';
  if (!entries || entries.length === 0) {
    list.innerHTML = '<div class="news-empty">まだ変更履歴がありません</div>';
    return;
  }
  for (const e of entries) {
    const div = document.createElement('div');
    div.className = 'news-item';
    const ts = new Date(e.ts);
    const tsStr = `${ts.getMonth()+1}/${ts.getDate()} ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`;
    div.innerHTML = `
      <div class="news-ts">${tsStr}</div>
      <div class="news-summary">${escapeHtml(e.summary || '(変更)')}</div>
    `;
    if (e.month) {
      const jump = document.createElement('button');
      jump.className = 'news-jump';
      jump.textContent = `→ ${formatMonthLabel(e.month)} を見る`;
      jump.addEventListener('click', () => {
        closeNewsSheet();
        if (e.month !== CURRENT_MONTH) loadMonth(e.month);
      });
      div.appendChild(jump);
    }
    list.appendChild(div);
  }
}

function markNewsSeen(entries) {
  if (!entries || entries.length === 0) return;
  const latestTs = entries[0].ts;
  try { localStorage.setItem(NEWS_LAST_SEEN_KEY, latestTs); } catch (e) {}
  document.getElementById('news-toggle').classList.remove('has-new');
  document.getElementById('news-banner').hidden = true;
}

async function checkNewChanges() {
  if (!API_BASE_URL) return;
  const data = await fetchHistory(20);
  if (!data.entries || data.entries.length === 0) return;
  let lastSeen = null;
  try { lastSeen = localStorage.getItem(NEWS_LAST_SEEN_KEY); } catch (e) {}
  if (!lastSeen) {
    // First visit: mark all as seen
    markNewsSeen(data.entries);
    return;
  }
  const newOnes = data.entries.filter(e => e.ts > lastSeen);
  if (newOnes.length === 0) return;
  // Show banner + highlight news button
  const banner = document.getElementById('news-banner');
  banner.innerHTML = `
    <button class="news-banner">
      <span class="news-banner-text">前回以降に ${newOnes.length} 件の変更があります</span>
      <span class="news-banner-arrow">→ おしらせ</span>
    </button>
  `;
  banner.hidden = false;
  banner.querySelector('button').addEventListener('click', () => {
    banner.hidden = true;
    openNewsSheet();
  });
  document.getElementById('news-toggle').classList.add('has-new');
}

/* ────────────────────────────────────────────────────────
 * Edit mode (within day sheet, requires upload key)
 * ──────────────────────────────────────────────────────── */

let EDIT_STATE = null; // { date: 'YYYY-MM-DD', items: [...], saving: bool }

function enterEditMode(date) {
  const iso = isoLocal(date);
  const items = eventsForDate(iso).map(it => ({ ...it, tags: it.tags ? [...it.tags] : [] }));
  EDIT_STATE = { date: iso, dateObj: date, items, saving: false };
  renderEditMode();
}

function exitEditMode() {
  if (!EDIT_STATE) return;
  const dateObj = EDIT_STATE.dateObj;
  EDIT_STATE = null;
  if (dateObj) openDaySheet(dateObj);
}

function renderEditMode() {
  const content = document.getElementById('sheet-content');
  content.innerHTML = '';

  const date = EDIT_STATE.dateObj;
  const wd = date.getDay();
  const numCls = wd === 0 ? ' sun' : wd === 6 ? ' sat' : '';

  const head = document.createElement('div');
  head.className = 'sheet-day-head';
  head.innerHTML = `
    <div class="sheet-day-num${numCls}">
      <span>${date.getMonth()+1}月${date.getDate()}日</span>
      <span class="wd">${WEEKDAY_JP[wd]} を編集</span>
    </div>
    <div class="sheet-day-summary">時間・場所・演目を変更、 削除、 追加できます</div>
  `;
  content.appendChild(head);

  const list = document.createElement('div');
  list.className = 'edit-list';
  EDIT_STATE.items.forEach((it, idx) => list.appendChild(buildEditRow(it, idx)));
  content.appendChild(list);

  const addBtn = document.createElement('button');
  addBtn.className = 'edit-add-btn';
  addBtn.textContent = '+ 予定を追加';
  addBtn.addEventListener('click', () => {
    EDIT_STATE.items.push({
      date: EDIT_STATE.date,
      start: '13:00',
      end: '14:00',
      studio: 'kawagoe',
      type: 'rehearsal',
      label: '',
      tags: [],
    });
    renderEditMode();
  });
  content.appendChild(addBtn);

  const status = document.createElement('div');
  status.id = 'edit-status';
  content.appendChild(status);

  const actions = document.createElement('div');
  actions.className = 'edit-actions';
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.addEventListener('click', exitEditMode);
  const saveBtn = document.createElement('button');
  saveBtn.className = 'primary';
  saveBtn.textContent = '保存';
  saveBtn.addEventListener('click', saveEdits);
  actions.appendChild(cancelBtn);
  actions.appendChild(saveBtn);
  content.appendChild(actions);
}

function buildEditRow(it, idx) {
  const studio = META.studios[it.studio] || { color: 'var(--accent)' };
  const row = document.createElement('div');
  row.className = 'edit-row';
  row.style.setProperty('--studio-color', studio.color);

  const fields = document.createElement('div');
  fields.className = 'edit-fields';

  // time row
  const startIn = makeInput('time', it.start || '13:00');
  const dash = document.createElement('span');
  dash.className = 'edit-dash';
  dash.textContent = '〜';
  const endIn = makeInput('time', it.end || '14:00');
  fields.appendChild(startIn);
  fields.appendChild(dash);
  fields.appendChild(endIn);

  // studio
  const studioSel = makeSelect(Object.entries(META.studios).map(([k, v]) => ({ value: k, label: v.name })), it.studio);
  studioSel.classList.add('row-full');
  fields.appendChild(studioSel);

  // type
  const typeSel = makeSelect(Object.entries(META.types).map(([k, v]) => ({ value: k, label: v.symbol + ' ' + v.name })), it.type);
  typeSel.classList.add('row-full');
  fields.appendChild(typeSel);

  // label
  const labelIn = makeInput('text', it.label || '');
  labelIn.placeholder = '演目・クラス名 (例: 海賊、 合同クラス)';
  labelIn.classList.add('row-full');
  fields.appendChild(labelIn);

  // note (optional)
  const noteIn = document.createElement('textarea');
  noteIn.value = it.note || '';
  noteIn.placeholder = 'メモ (任意)';
  noteIn.rows = 1;
  noteIn.classList.add('row-full');
  fields.appendChild(noteIn);

  // bind: write back to the underlying item
  const bind = (el, field) => {
    el.addEventListener('change', () => { it[field] = el.value; });
    el.addEventListener('input', () => { it[field] = el.value; });
  };
  bind(startIn, 'start');
  bind(endIn, 'end');
  bind(labelIn, 'label');
  bind(noteIn, 'note');
  studioSel.addEventListener('change', () => {
    it.studio = studioSel.value;
    const ns = META.studios[it.studio];
    if (ns) row.style.setProperty('--studio-color', ns.color);
  });
  typeSel.addEventListener('change', () => { it.type = typeSel.value; });

  row.appendChild(fields);

  const del = document.createElement('button');
  del.className = 'edit-del';
  del.textContent = '✕';
  del.title = '削除';
  del.addEventListener('click', () => {
    if (!confirm(`「${it.label || '(無題)'}」 を削除しますか?`)) return;
    EDIT_STATE.items.splice(idx, 1);
    renderEditMode();
  });
  row.appendChild(del);

  return row;
}

function makeInput(type, value) {
  const i = document.createElement('input');
  i.type = type;
  i.value = value;
  return i;
}

function makeSelect(options, current) {
  const sel = document.createElement('select');
  for (const opt of options) {
    const o = document.createElement('option');
    o.value = opt.value;
    o.textContent = opt.label;
    if (opt.value === current) o.selected = true;
    sel.appendChild(o);
  }
  return sel;
}

function setEditStatus(text, kind = 'info') {
  const el = document.getElementById('edit-status');
  if (!el) return;
  el.innerHTML = '';
  if (!text) return;
  const div = document.createElement('div');
  div.className = 'edit-status ' + kind;
  div.textContent = text;
  el.appendChild(div);
}

async function saveEdits() {
  if (!EDIT_STATE) return;

  // Validate
  for (const it of EDIT_STATE.items) {
    if (!it.label || !it.label.trim()) {
      setEditStatus('「演目・クラス名」 が空の予定があります', 'error');
      return;
    }
    if (!/^\d{1,2}:\d{2}$/.test(it.start) || !/^\d{1,2}:\d{2}$/.test(it.end)) {
      setEditStatus('時刻の形式が正しくありません', 'error');
      return;
    }
    if (!META.studios[it.studio]) {
      setEditStatus('スタジオの選択が不正です', 'error');
      return;
    }
    if (!META.types[it.type]) {
      setEditStatus('種別の選択が不正です', 'error');
      return;
    }
    // Clean up: ensure date
    it.date = EDIT_STATE.date;
    if (!Array.isArray(it.tags)) it.tags = [];
    if (it.note === '' || it.note == null) delete it.note;
  }

  const key = getUploadKey();
  if (!API_BASE_URL || !key) {
    setEditStatus('編集権限なし (URL の #key= が必要)', 'error');
    return;
  }

  // Rebuild full month events: keep other days + this day's new items
  const otherDays = (MONTH_DATA.events || []).filter(ev => ev.date !== EDIT_STATE.date);
  const newEvents = [...otherDays, ...EDIT_STATE.items];
  newEvents.sort((a,b) => (a.date+a.start).localeCompare(b.date+b.start));

  const payload = {
    month: CURRENT_MONTH,
    month_label: formatMonthLabel(CURRENT_MONTH),
    generated_at: isoLocal(new Date()),
    source: MONTH_DATA.source || 'edited via app',
    events: newEvents,
    prev_version: MONTH_DATA._version,
  };

  setEditStatus('保存中…', 'info');
  EDIT_STATE.saving = true;

  try {
    const res = await fetch(`${API_BASE_URL}/api/upload?month=${CURRENT_MONTH}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Upload-Key': key,
      },
      body: JSON.stringify(payload),
    });
    const json = await res.json();
    if (!res.ok) throw new Error((json.error || '') + (json.detail ? ': ' + json.detail : ''));

    const savedDateObj = EDIT_STATE.dateObj;
    EDIT_STATE = null;
    await loadMonth(CURRENT_MONTH);
    openDaySheet(savedDateObj);
    checkNewChanges();
  } catch (e) {
    EDIT_STATE.saving = false;
    setEditStatus('保存失敗: ' + e.message, 'error');
  }
}

/* ────────────────────────────────────────────────────────
 * Import: auth, modal, parsing, preview, upload/download
 * ──────────────────────────────────────────────────────── */

function captureUploadKeyFromHash() {
  // URL: ...#key=XXXX  → localStorage に保存
  const hash = window.location.hash || '';
  const m = hash.match(/key=([^&]+)/);
  if (m) {
    const key = decodeURIComponent(m[1]);
    try { localStorage.setItem(UPLOAD_KEY_STORAGE, key); } catch (e) {}
    // Strip key from URL (history clean)
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }
}

function getUploadKey() {
  try { return localStorage.getItem(UPLOAD_KEY_STORAGE); } catch (e) { return null; }
}

function bindImportModal() {
  captureUploadKeyFromHash();
  // News button: everyone sees it (read-only history)
  document.getElementById('news-toggle').classList.add('visible');
  // Menu button: only when upload key is stored
  const menuBtn = document.getElementById('menu-toggle');
  if (getUploadKey() && API_BASE_URL) {
    menuBtn.classList.add('visible');
  }

  // Menu sheet wiring
  document.getElementById('menu-toggle').addEventListener('click', openMenuSheet);
  document.getElementById('menu-close').addEventListener('click', closeMenuSheet);
  document.getElementById('menu-backdrop').addEventListener('click', closeMenuSheet);
  bindSwipeToDismiss(document.getElementById('menu-sheet'), closeMenuSheet);
  document.getElementById('menu-go-add').addEventListener('click', () => {
    closeMenuSheet();
    openAddSheet();
  });
  document.getElementById('menu-go-import').addEventListener('click', () => {
    closeMenuSheet();
    openImportSheet();
  });

  // Import sheet wiring
  document.getElementById('import-close').addEventListener('click', closeImportSheet);
  document.getElementById('import-backdrop').addEventListener('click', closeImportSheet);
  bindSwipeToDismiss(document.getElementById('import-sheet'), closeImportSheet);

  // Inputs auto-parse
  const pdfInput = document.getElementById('import-pdf');
  pdfInput.addEventListener('change', () => {
    const f = pdfInput.files[0];
    document.getElementById('pdf-name').textContent = f ? f.name : '(未選択)';
    if (f) autoParse();
  });

  const textInput = document.getElementById('import-text');
  let textDebounce = null;
  textInput.addEventListener('input', () => {
    if (textDebounce) clearTimeout(textDebounce);
    textDebounce = setTimeout(autoParse, 400);
  });

  // Month picker re-parse
  document.getElementById('import-month').addEventListener('change', autoParse);

  // Main action
  document.getElementById('import-action').addEventListener('click', performAdd);
  document.getElementById('import-download').addEventListener('click', downloadCurrentPreview);
}

function performAdd() {
  if (!CURRENT_PREVIEW) return;
  if (API_BASE_URL && getUploadKey()) {
    uploadCurrentPreview();
  } else {
    downloadCurrentPreview();
    setImportStatus('オフラインモード: ファイルがダウンロードされます。 大作さんに送ってください', 'info');
  }
}

function openImportSheet() {
  // Populate month picker
  const sel = document.getElementById('import-month');
  sel.innerHTML = '';
  const [y, m] = CURRENT_MONTH.split('-').map(Number);
  for (let i = -2; i <= 6; i++) {
    const d = new Date(y, m - 1 + i, 1);
    const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (ym < MONTH_RANGE_MIN || ym > MONTH_RANGE_MAX) continue;
    const opt = document.createElement('option');
    opt.value = ym;
    opt.textContent = formatMonthLabel(ym);
    if (ym === CURRENT_MONTH) opt.selected = true;
    sel.appendChild(opt);

  clearImportStatus();
  document.getElementById('import-preview').hidden = true;

  document.getElementById('import-pdf').value = '';

function closeImportSheet() {

  backdrop.classList.remove('show');
  sheet.setAttribute('aria-hidden', 'true');

function setImportStatus(text, kind = 'info') {

  if (!text) return;
  const div = document.createElement('div');
  div.className = 'import-status ' + kind;

function clearImportStatus() {
  document.getElementById('import-status').innerHTML = '';
